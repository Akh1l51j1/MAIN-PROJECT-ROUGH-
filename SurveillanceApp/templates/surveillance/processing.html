<!-- SurveillanceApp\templates\surveillance\processing.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing Search - {{ search.license_plate }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .processing-container {
            background: white;
            border-radius: 20px;
            padding: 60px 80px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 600px;
        }

        .spinner {
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
            border: 6px solid #e0e0e0;
            border-top: 6px solid #2291c1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .plate-display {
            font-size: 42px;
            font-weight: 900;
            font-family: monospace;
            letter-spacing: 5px;
            background: linear-gradient(135deg, #2291c1 0%, #71baeb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 15px;
        }

        .status-text {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .cameras-list {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-top: 30px;
        }

        .camera-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .camera-item:last-child {
            border-bottom: none;
        }

        .camera-name {
            font-weight: 600;
            color: #333;
        }

        .scanning-badge {
            background: #2291c1;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 30px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #2291c1, #71baeb);
            width: 0%;
            animation: progress 3s ease-in-out infinite;
        }

        @keyframes progress {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }

        .info-text {
            margin-top: 20px;
            color: #999;
            font-size: 14px;
        }

        .pulse {
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
    </style>
</head>
<body>
    <div class="processing-container">
        <div class="spinner"></div>
        
        <div class="plate-display">{{ search.license_plate }}</div>
        
        <h1><i class="bi bi-search"></i> Analyzing Footage</h1>
        
        <p class="status-text">
            Scanning multiple camera feeds to track this vehicle.<br>
            This may take 30-60 seconds...
        </p>

        <div class="cameras-list">
            <div class="camera-item">
                <div>
                    <i class="bi bi-camera-video"></i>
                    <span class="camera-name">Main Street Intersection</span>
                </div>
                <span class="scanning-badge pulse">Scanning</span>
            </div>
            <div class="camera-item">
                <div>
                    <i class="bi bi-camera-video"></i>
                    <span class="camera-name">Highway Exit 42</span>
                </div>
                <span class="scanning-badge pulse">Scanning</span>
            </div>
            <div class="camera-item">
                <div>
                    <i class="bi bi-camera-video"></i>
                    <span class="camera-name">Downtown Plaza</span>
                </div>
                <span class="scanning-badge pulse">Scanning</span>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>

        <p class="info-text">
            <i class="bi bi-info-circle"></i> 
            Using AI-powered license plate recognition across all cameras
        </p>
    </div>

    <script>
        // AJAX polling to check if processing is complete
        const searchId = {{ search.id }};
        
        function checkStatus() {
            fetch(`/api/check-status/${searchId}/`)
                .then(response => response.json())
                .then(data => {
                    if (data.is_processed) {
                        // Redirect to results page
                        window.location.href = `/tracking/${searchId}/`;
                    }
                })
                .catch(error => {
                    console.error('Error checking status:', error);
                });
        }

        // Poll every 3 seconds
        setInterval(checkStatus, 3000);
        
        // Also check immediately
        checkStatus();
    </script>
</body>
</html>
