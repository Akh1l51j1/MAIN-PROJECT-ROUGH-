<!-- SurveillanceApp\templates\surveillance\processing_incident.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyzing Video Feed</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .processing-container {
            background: white;
            border-radius: 20px;
            padding: 60px 80px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 600px;
        }

        .spinner {
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
            border: 6px solid #e0e0e0;
            border-top: 6px solid #e74c3c;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 15px;
        }

        .status-text {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .steps-list {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-top: 30px;
            text-align: left;
        }

        .step-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .step-item:last-child {
            border-bottom: none;
        }

        .step-icon {
            margin-right: 12px;
            font-size: 18px;
        }

        .step-name {
            font-weight: 600;
            color: #333;
            flex: 1;
        }

        .scanning-badge {
            background: #e74c3c;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 30px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e74c3c, #f39c12);
            width: 0%;
            animation: progress 4s ease-in-out infinite;
        }

        @keyframes progress {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }

        .info-text {
            margin-top: 20px;
            color: #999;
            font-size: 14px;
        }

        .pulse {
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
    </style>
</head>
<body>
    <div class="processing-container">
        <div class="spinner"></div>
        
        <h1><i class="bi bi-search"></i> Analyzing Video Feed</h1>
        
        <p class="status-text">
            Running AI anomaly detection on the camera feed.<br>
            This may take 2-5 minutes...
        </p>

        <div class="steps-list">
            <div class="step-item">
                <span class="step-icon"><i class="bi bi-camera-video"></i></span>
                <span class="step-name">Incident Detection (YOLOv8)</span>
                <span class="scanning-badge pulse">Processing</span>
            </div>
            <div class="step-item">
                <span class="step-icon"><i class="bi bi-123"></i></span>
                <span class="step-name">License Plate Extraction</span>
                <span class="scanning-badge pulse">Pending</span>
            </div>
            <div class="step-item">
                <span class="step-icon"><i class="bi bi-broadcast"></i></span>
                <span class="step-name">Multi-Camera Vehicle Tracking</span>
                <span class="scanning-badge pulse">Pending</span>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>

        <p class="info-text">
            <i class="bi bi-info-circle"></i> 
            Using custom YOLOv8 model running on Kaggle GPU
        </p>
    </div>

    <script>
        // AJAX polling to check if processing is complete
        const logId = {{ log.id }};
        
        function checkStatus() {
            fetch(`/api/check-incident-status/${logId}/`)
                .then(response => response.json())
                .then(data => {
                    if (data.is_processed) {
                        // Redirect to dashboard
                        window.location.href = '/';
                    }
                })
                .catch(error => {
                    console.error('Error checking status:', error);
                });
        }

        // Poll every 5 seconds
        setInterval(checkStatus, 5000);
        
        // Also check immediately
        checkStatus();
    </script>
</body>
</html>
